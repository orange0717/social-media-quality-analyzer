<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소셜 미디어 저품질 분석기</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>소셜 미디어 저품질 분석기</h1>
            <p class="subtitle">계정 ID를 입력하면 검색 노출, 활동 빈도, 저품질 위험도를 분석합니다</p>
        </header>

        <section class="platform-tabs">
            <button class="tab-btn active" data-platform="naver" onclick="switchTab('naver')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M16.273 12.845 7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727v12.845Z"/></svg> 네이버 블로그
            </button>
            <button class="tab-btn" data-platform="youtube" onclick="switchTab('youtube')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> 유튜브
            </button>
            <button class="tab-btn" data-platform="instagram" onclick="switchTab('instagram')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg> 인스타그램
            </button>
            <button class="tab-btn" data-platform="threads" onclick="switchTab('threads')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.59 12c.025 3.086.718 5.496 2.057 7.164 1.432 1.781 3.632 2.695 6.54 2.717 2.227-.017 4.07-.531 5.394-1.656 1.41-1.196 2.124-2.823 2.124-4.834 0-1.236-.333-2.224-.988-2.933-.528-.571-1.217-.913-2.028-1.032a5.867 5.867 0 0 1 .107 1.089c0 2.392-1.327 4.317-3.593 4.317-1.542 0-2.868-.942-3.373-2.327-.283-.776-.374-1.767-.187-2.757.35-1.845 1.524-3.15 3.274-3.59.584-.148 1.145-.177 1.691-.125a5.2 5.2 0 0 1 1.786.499l.153-.908c.032-.193.062-.39.089-.59a21.22 21.22 0 0 0 .072-.658l2.077.292a21.898 21.898 0 0 1-.198 1.755c-.027.172-.057.34-.09.505l-.094.478c1.187.457 2.11 1.218 2.717 2.236.693 1.163 1.045 2.586 1.045 4.227 0 2.694-1.005 4.932-2.906 6.479C17.24 23.294 14.954 23.98 12.186 24zM10.8 12.766c-.136.72-.063 1.381.134 1.92.287.787.983 1.318 1.858 1.318 1.395 0 1.712-1.266 1.712-2.198 0-.593-.128-1.123-.434-1.56-.374-.535-.96-.863-1.7-.949-.493-.058-.998-.024-1.508.119-.838.263-1.394.857-1.594 1.633l-.043.177.078-.13-.003.002a4.21 4.21 0 0 0-.5.668z"/></svg> 스레드
            </button>
            <button class="tab-btn" data-platform="x" onclick="switchTab('x')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg> X
            </button>
            <button class="tab-btn" data-platform="tiktok" onclick="switchTab('tiktok')">
                <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg> 틱톡
            </button>
        </section>

        <section class="input-section">
            <div class="input-group">
                <label id="inputLabel" for="accountId">블로그 ID</label>
                <div class="input-row-single">
                    <input type="text" id="accountId" placeholder="예: akzkfltm2">
                    <button id="analyzeBtn" onclick="startAnalysis()">
                        <span class="btn-text">분석 시작</span>
                        <span class="btn-loading" style="display:none">
                            <span class="spinner"></span> 분석 중...
                        </span>
                    </button>
                </div>
                <p id="inputHint" class="input-hint">블로그 ID를 입력하세요 (URL의 blog.naver.com/ 뒤 부분)</p>
            </div>
        </section>

        <div id="loading" class="loading" style="display:none">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p>분석하고 있습니다...</p>
                <p class="loading-sub" id="loadingText">검색 노출 테스트, 게시글 수집, 저품질 판정 중</p>
                <div id="progressBar" class="progress-bar" style="display:none">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressDetail" class="progress-detail" style="display:none"></p>
            </div>
        </div>

        <div id="results" style="display:none">
            <div id="blogCards" class="blog-cards"></div>
        </div>

        <div id="error" class="error-msg" style="display:none"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
